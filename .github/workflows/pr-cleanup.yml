name: pr-cleanup

on:
  workflow_call:
    inputs:
      delete_hash:
        required: true
        type: string
    secrets:
      DOCKER_PASSWORD:
        required: true
      SSH_KEY:
        required: true

jobs:
  clean-pr-environments:
    name: Clean pr environments
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: ssh to server and cleanup
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USERNAME }}
          port: ${{ vars.PORT }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            BASE_DIR="/opt/apps/pr-env"

            TARGET_DIR="$BASE_DIR/pr-${{github.event.pull_request.number }}-${{ inputs.delete_hash }}"

            if [ -d "$TARGET_DIR" ]; then
              echo "Folder exists, deleting..."
              find "$BASE_DIR/pr-${{github.event.pull_request.number }}-${{ inputs.delete_hash }}" -mindepth 1 -maxdepth 1 -type d | while IFS= read -r folder; do
                echo "Processing $folder"

                if [ -f "$folder/docker-compose.yml" ]; then
                  echo "Stopping docker compose in $folder"
                  (cd "$folder" && docker compose down)
                fi

                echo "Deleting $folder"
                rm -rf "$folder"

                echo "Done with $folder"
                echo "---------------------"
              done
            else
              echo "Folder does not exist, skipping..."
              exit 0

name: pr-cleanup

on:
  workflow_call:
    secrets:
      DOCKER_PASSWORD:
        required: true
      SSH_KEY:
        required: true

jobs:
  get-previous-commit-hash:
    name: Get previous commit hash
    runs-on: ubuntu-latest
    outputs:
      previous_short_sha: ${{ steps.extract.outputs.previous_short_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract previous commit hash
        id: extract
        run: |
          set -x
          PREVIOUS_COMMIT_HASH=$(git rev-parse HEAD^)
          PREVIOUS_SHORT_SHA=$(echo "$PREVIOUS_COMMIT_HASH" | cut -c1-7)
          echo "Previous short SHA: $PREVIOUS_SHORT_SHA"
          echo "::set-output name=previous_short_sha::$PREVIOUS_SHORT_SHA"

  clean-pr-environments:
    name: Clean pr environments
    needs: get-previous-commit-hash
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: ssh to server and cleanup
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USERNAME }}
          port: ${{ vars.PORT }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -x
            BASE_DIR="/opt/apps/pr-env"

            SHORT_SHA=${{ needs.get-previous-commit-hash.outputs.previous_short_sha }}

            TARGET_DIR="$BASE_DIR/pr-${{github.event.pull_request.number }}-$SHORT_SHA"

            if [ -d "$TARGET_DIR" ]; then
              echo "Folder exists, deleting..."
              find $TARGET_DIR -mindepth 1 -maxdepth 1 -type d | while IFS= read -r folder; do
                echo "Processing $folder"

                if [ -f "$folder/docker-compose.yml" ]; then
                  echo "Stopping docker compose in $folder"
                  (cd "$folder" && docker compose down)
                fi

                echo "Deleting $folder"
                rm -rf "$folder"

                echo "Done with $folder"
                echo "---------------------"
              done
            else
              echo "Folder does not exist, skipping..."
              exit 0

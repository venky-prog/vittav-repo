name: Application lint checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  lint:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.set-matrix.outputs.apps }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get affected production apps
        id: set-matrix
        run: |
          apps=$(pnpm nx show projects --affected --type=app --json --base=origin/main --head=HEAD \
            | jq -c '[.[] | select(.tags | index("production")) | .name]')
          echo "Raw apps: $apps"
          echo "apps=$apps" >> $GITHUB_OUTPUT


  check:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJson(needs.lint.outputs.apps) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Matrix lint
        run: pnpm nx lint ${{ matrix.app }}

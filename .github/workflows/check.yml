name: Pr create

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  lint-check:
    uses: ./.github/workflows/lint-check.yml
    with:
      base_branch: origin/main

  get_effected_apps:
    needs: lint-check
    uses: ./.github/workflows/effected-apps-list.yml
    with:
      base_branch: origin/main
      app_framework: NextApp

  build_effected_apps:
    needs: get_effected_apps
    uses: ./.github/workflows/effected-apps-build-release.yml
    secrets: inherit
    with:
        base_branch: origin/main
        effectedApps: ${{ needs.get_effected_apps.outputs.effected_apps || '[]' }}
        app_framework: NextApp
        isPr: true

name: PR Checks

on:
  pull_request:
    branches: [main]
    types:
      - opened
      - synchronize
      - reopened

jobs:
  lint-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run lint check
        run: pnpm nx affected --target=lint --parallel --max-parallel=5 --base=origin/main --head=HEAD

  ts-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run ts check
        run: pnpm nx affected --target=ts-check --parallel --max-parallel=5 --base=origin/main --head=HEAD

  get-affected-apps:
    runs-on: ubuntu-latest
    needs: [lint-check, ts-check]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Get affected apps
        id: affected-apps
        run: |
          echo "affected_apps=$(pnpm nx show projects --affected --projects=tag:app --json --base=origin/main --head=HEAD)"
          if [ -z "$affected_apps" ]; then
            affected_apps="[]"
          fi

          echo "affected_apps=$affected_apps" >> $GITHUB_OUTPUT

      - name: Print affected apps
        run: echo "Affected apps:${{ steps.get-affected-apps.outputs.affected_apps }}"

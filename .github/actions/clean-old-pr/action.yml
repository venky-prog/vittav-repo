name: Clean Old PR

description: This action cleans up old PR environments by deleting the corresponding tags.

inputs:
  ssh_host:
    description: 'SSH host for connecting to the server'
    required: true
    default: 'your-ssh-host'
  ssh_username:
    description: 'SSH username for connecting to the server'
    required: true
    default: 'your-ssh-username'
  ssh_port:
    description: 'SSH port for connecting to the server'
    required: false
    default: '22'
  ssh_key:
    description: 'SSH private key for connecting to the server'
    required: true
    default: 'your-ssh-private-key'

runs:
  using: composite
  steps:
    - name: Clean old PR hash
      id: get-old-pr-tag
      shell: bash
      run: |
        old_short_sha=$(git rev-parse HEAD^)
        old_short_sha=${old_short_sha:0:7}
        old_pr_tag="pr-${{ github.event.pull_request.number }}-${old_short_sha}"
        echo "old_pr_tag=$old_pr_tag" >> $GITHUB_OUTPUT

    - name: Delete old PR environment
      uses: appleboy/ssh-action@v1
      env:
        OLD_PR_TAG: ${{ steps.get-old-pr-tag.outputs.old_pr_tag }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      with:
        host: ${{ inputs.ssh_host }}
        username: ${{ inputs.ssh_username }}
        port: ${{ inputs.ssh_port }}
        key: ${{ inputs.ssh_key }}
        script_path: ../../../scripts/delete-old-pr-env.sh

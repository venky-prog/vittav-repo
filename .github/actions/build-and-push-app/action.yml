name: Build and Push App

description: This action builds the affected apps and pushes the corresponding tags to the remote repository.

runs:
  using: composite

  steps:
    - name: Login to Docker registry
      uses: docker/login-action@v3
      with:
        registry: ${{ vars.DOCKER_REGISTRY }}
        username: ${{ vars.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build affected Next.js app
      shell: bash
      run: |
        pnpm nx build ${{ matrix.app }} --skip-nx-cache
        if ["${{ inputs.app_framework }}" = "NestApp"]; then
          pnpm nx prune ${{ matrix.app }} --skip-nx-cache
        fi

    - name: Extract app name
      id: extract-app-name
      shell: bash
      run: |
        RAW="${{ matrix.app }}"
        APP_NAME="${RAW##*/}"
        echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT

    - name: Tag and push Docker image
      shell: bash
      run: |
        APP_NAME="${{ steps.extract-app-name.outputs.app_name }}"
        TAG="pr-${{ github.event.pull_request.number }}-$(echo $GITHUB_SHA | cut -c1-7)"
        docker build -t ${{ vars.DOCKER_REGISTRY }}/$APP_NAME:$TAG -f apps/$APP_NAME/Dockerfile .
        docker push ${{ vars.DOCKER_REGISTRY }}/$APP_NAME:$TAG


